<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{--red:#FF385C;--ink:#222;--mut:#717171;--bg:#fafafa;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--bg);}
  header{padding:20px 24px;background:#fff;border-bottom:1px solid #eee;}
  h1{margin:0 0 4px;font-size:22px}
  .sub{color:var(--mut);font-size:13px}
  .name-box{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .name-box input{padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;flex:1;max-width:300px}
  .name-box .status{font-size:13px;color:var(--mut)}
  #map{height:380px;width:100%;border-bottom:1px solid #eee;z-index:0}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 16px}
  h2{font-size:18px;margin:24px 0 12px;border-bottom:2px solid var(--red);padding-bottom:6px;display:inline-block}
  .leaderboard{background:#fff;border-radius:12px;border:1px solid #eee;padding:14px 16px;margin-bottom:24px}
  .lb-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f3f3f3;font-size:14px}
  .lb-row:last-child{border:0}
  .lb-rank{width:24px;color:var(--mut);font-weight:600;font-size:13px}
  .lb-name{flex:1;font-weight:500}
  .lb-bar{flex:2;background:#f1f1f1;height:8px;border-radius:4px;overflow:hidden;max-width:300px}
  .lb-bar > div{height:100%;background:var(--red);border-radius:4px;transition:width .3s}
  .lb-count{width:60px;text-align:right;color:var(--mut);font-size:13px}
  .lb-voters{font-size:11px;color:var(--mut);margin-left:6px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s;position:relative}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
  .card .photo{aspect-ratio:4/3;background:#eee center/cover no-repeat;position:relative}
  .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;font-weight:600}
  .vote-pill{position:absolute;top:8px;right:8px;background:#fff;color:var(--red);font-size:13px;padding:4px 10px;border-radius:20px;box-shadow:0 2px 6px rgba(0,0,0,.2);font-weight:700}
  .body{padding:12px 14px;flex:1;display:flex;flex-direction:column}
  .nbhd{font-size:11px;text-transform:uppercase;color:var(--mut);letter-spacing:.5px}
  .title{font-weight:600;font-size:15px;margin:4px 0 6px;line-height:1.3}
  .stats{font-size:12px;color:var(--mut);margin:6px 0}
  .pc{margin:8px 0 4px;font-size:12px;line-height:1.5}
  .pc ul{margin:2px 0 6px;padding-left:18px}
  .pc .pros li{color:#0a7d2a}
  .pc .cons li{color:#b00}
  .pc-label{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
  .host{font-size:12px;color:var(--mut);margin-top:auto;padding-top:8px}
  .btns{display:flex;gap:6px;padding:0 14px 14px}
  .btn{flex:1;text-align:center;padding:9px;text-decoration:none;border-radius:8px;font-weight:600;font-size:13px;border:0;cursor:pointer;font-family:inherit}
  .btn-vote{background:var(--red);color:#fff}
  .btn-vote:hover{background:#e0314f}
  .btn-vote:disabled{background:#ccc;cursor:not-allowed}
  .btn-vote.voted{background:#0a7d2a}
  .btn-vote.locked{background:#fff;color:#999;border:1px solid #ddd}
  .btn-link{background:#fff;color:var(--ink);border:1px solid #ddd}
  .btn-link:hover{background:#f5f5f5}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
  .toast.show{opacity:1}
</style>

<style>
.gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,rgba(255,56,92,.55) 0%,rgba(20,20,40,.75) 100%),url('https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=1600&q=80') center/cover no-repeat;}
.gate-box{background:rgba(255,255,255,.97);border-radius:16px;padding:32px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;backdrop-filter:blur(8px)}
.gate h1{margin:0 0 4px;font-size:24px;color:#222}
.gate .tag{color:#FF385C;font-weight:600;font-size:13px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.gate p{margin:0 0 18px;color:#717171;font-size:14px;line-height:1.4}
.gate input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:10px;box-sizing:border-box}
.gate input:focus{outline:none;border-color:#FF385C}
.gate button{width:100%;padding:13px;background:#FF385C;color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.gate button:hover{background:#e0314f}
.gate .err{color:#b00;font-size:13px;margin-top:8px;min-height:18px}
.gate .emoji{font-size:54px;margin-bottom:4px}
</style>
</head>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="emoji">🇧🇷</div>

    <h1>Welkom bij de Airbnb poll</h1>
    <p>Vul je naam + wachtwoord in. Daarna kan je stemmen op je favoriete huis.</p>
    <form id="gate-form">

      <input id="gate-pw" type="password" autocomplete="off" placeholder="Wachtwoord">
      <button type="submit">Open de poll</button>
      <div class="err" id="gate-err"></div>
    </form>
  </div>
</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

async function deriveKey(pw){
  const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(BUNDLE.salt),iterations:BUNDLE.iter,hash:'SHA-256'},
    baseKey,{name:'AES-GCM',length:256},false,['decrypt']
  );
}

async function tryUnlock(pw){
  const key=await deriveKey(pw);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(BUNDLE.nonce)},key,b64(BUNDLE.ct));
  return new TextDecoder().decode(pt);
}

function injectAndRun(html){
  const c=document.getElementById('content');
  c.innerHTML=html;c.style.display='';
  document.getElementById('gate').remove();
  // Re-execute scripts sequentially (innerHTML doesn't run them).
  // External scripts must finish loading before next runs, or globals like L (Leaflet) are undefined.
  const scripts=[...c.querySelectorAll('script')];
  (async()=>{
    for(const old of scripts){
      await new Promise(res=>{
        const s=document.createElement('script');
        [...old.attributes].forEach(a=>s.setAttribute(a.name,a.value));
        if(old.src){s.onload=s.onerror=res}
        else{s.text=old.textContent}
        old.parentNode.replaceChild(s,old);
        if(!old.src)res();
      });
    }
  })();
}

document.getElementById('gate-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const name=document.getElementById('gate-name').value.trim();
  const pw=document.getElementById('gate-pw').value;
  const err=document.getElementById('gate-err');
  err.textContent='';
  if(!name){err.textContent='Vul je naam in';return}
  try{
    const html=await tryUnlock(pw);
    sessionStorage.setItem('rio_pw',pw);
    localStorage.setItem('rio_voter',name);
    injectAndRun(html);
  }catch(_){err.textContent='Verkeerd wachtwoord'}
});

// Auto-unlock if pw + name already cached
(async()=>{
  const cached=sessionStorage.getItem('rio_pw');
  const name=localStorage.getItem('rio_voter');
  if(cached && name){
    try{const html=await tryUnlock(cached);injectAndRun(html);}
    catch(_){sessionStorage.removeItem('rio_pw')}
  }
  // pre-fill name field if we know them but no pw cached
  if(name && !cached){document.getElementById('gate-name').value=name;document.getElementById('gate-pw').focus();}
  else if(!name){document.getElementById('gate-name').focus();}
})();
</script>
